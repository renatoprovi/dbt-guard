# Perfil mínimo para dbt compile. Para compilar sem banco real, use este diretório como DBT_PROFILES_DIR.
# Ex.: DBT_PROFILES_DIR=. dbt compile
default:
  target: dev
  outputs:
    dev:
      type: postgres
      host: localhost
      user: dbt
      password: dbt
      port: 5432
      dbname: dbt_guard_test
      schema: public
